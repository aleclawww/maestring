# Supabase local config — maestring

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://localhost"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "100MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/**"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
minimum_password_length = 8

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = true

[auth.email.smtp]
enabled = false
host = "inbucket"
port = 2500
user = "no-reply@maestring.com"
pass = ""
admin_email = "no-reply@maestring.com"
sender_name = "Maestring"

[auth.sms]
enable_signup = false

[auth.external.google]
enabled = false
client_id = ""
secret = ""

[analytics]
enabled = false

[experimental]
orioledb_version = ""
s3_host = ""
s3_region = ""
s3_access_key = ""
s3_secret_key = ""
