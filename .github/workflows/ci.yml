name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm test

  # Boots local Supabase via the CLI (Docker) and runs pgTAP assertions under
  # supabase/tests/*.sql. Gates PRs that touch migrations or trigger functions:
  # the handle_new_user search_path regression (migration 034) would have been
  # caught here before it ever reached prod. Kept separate from Unit tests so
  # a Docker pull failure doesn't fail fast the whole suite.
  db-tests:
    name: DB tests (pgTAP)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # `supabase db start` boots only Postgres + the migration runner inside
      # Docker — no auth/storage/studio containers. Faster than `supabase start`
      # and sufficient for pgTAP. Applies every file under supabase/migrations/
      # in order, so a migration with a syntax error fails this step.
      - name: Start local Supabase Postgres
        run: supabase db start
      # Runs pg_prove against supabase/tests/*.sql. Each file is wrapped in
      # begin/rollback so assertions don't leak between files.
      - name: Run pgTAP assertions
        run: supabase test db

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, db-tests]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_APP_URL: https://maestring.app
      CRON_SECRET: ci-placeholder
      MAGIC_LINK_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run build

  # ── Public smoke: always runs on every PR ─────────────────────────────────
  # Tests that need no auth, no Supabase, no real API keys. Just an app that
  # builds and starts. Catches: routing regressions, middleware breakage, static
  # page removal, API boundary bypasses. Should NEVER be skipped.
  e2e-public:
    name: E2E public smoke (always-on)
    runs-on: ubuntu-latest
    needs: build
    env:
      # Minimal env — public smoke never hits Supabase or external APIs.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      STRIPE_SECRET_KEY: sk_test_placeholder
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
      ANTHROPIC_API_KEY: placeholder
      OPENAI_API_KEY: placeholder
      RESEND_API_KEY: placeholder
      UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
      UPSTASH_REDIS_REST_TOKEN: placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: ci-placeholder
      MAGIC_LINK_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      # Run only the @public tag — no auth, no DB, safe with placeholder env.
      - run: npm run test:e2e -- --grep "@public"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-public
          path: playwright-report/
          retention-days: 7

  # ── Authenticated smoke: gated on staging Supabase ────────────────────────
  # Flip repo variable E2E_ENABLED to 'true' once a staging Supabase project
  # is wired up. Tests the full study loop, dashboard, settings.
  e2e-authenticated:
    name: E2E authenticated (staging)
    runs-on: ubuntu-latest
    needs: build
    if: vars.E2E_ENABLED == 'true'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: ci-placeholder
      MAGIC_LINK_SECRET: ci-placeholder
      ALLOW_TEST_AUTH: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      # Guardrail: refuse to run the test-auth shim against production Supabase.
      - name: Assert non-prod Supabase target
        env:
          PROD_SUPABASE_URL: ${{ vars.PROD_SUPABASE_URL }}
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL is empty — CI secrets not configured"
            exit 1
          fi
          if [ -n "${PROD_SUPABASE_URL:-}" ] && [ "$NEXT_PUBLIC_SUPABASE_URL" = "$PROD_SUPABASE_URL" ]; then
            echo "::error::CI Supabase URL matches PROD_SUPABASE_URL — test-auth shim would run against prod. Point CI at a staging project."
            exit 1
          fi
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e -- --grep "@smoke"
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-authenticated
          path: playwright-report/
          retention-days: 7
