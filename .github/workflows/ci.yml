name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run typecheck

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run lint

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm test

  # Boots local Supabase via the CLI (Docker) and runs pgTAP assertions under
  # supabase/tests/*.sql. Gates PRs that touch migrations or trigger functions:
  # the handle_new_user search_path regression (migration 034) would have been
  # caught here before it ever reached prod. Kept separate from Unit tests so
  # a Docker pull failure doesn't fail fast the whole suite.
  db-tests:
    name: DB tests (pgTAP)
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      # `supabase db start` boots only Postgres + the migration runner inside
      # Docker — no auth/storage/studio containers. Faster than `supabase start`
      # and sufficient for pgTAP. Applies every file under supabase/migrations/
      # in order, so a migration with a syntax error fails this step.
      - name: Start local Supabase Postgres
        run: supabase db start
      # Runs pg_prove against supabase/tests/*.sql. Each file is wrapped in
      # begin/rollback so assertions don't leak between files.
      - name: Run pgTAP assertions
        run: supabase test db

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, db-tests]
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_APP_URL: https://maestring.app
      CRON_SECRET: ci-placeholder
      MAGIC_LINK_SECRET: ci-placeholder
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      - run: npm run build

  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    needs: build
    # Only run when a staging Supabase project has been wired up. Flip the
    # repo variable E2E_ENABLED to 'true' once NEXT_PUBLIC_SUPABASE_URL and
    # friends point at a non-prod Supabase. Until then, keep CI green instead
    # of failing on "NEXT_PUBLIC_SUPABASE_URL is empty — CI secrets not configured".
    if: vars.E2E_ENABLED == 'true'
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      CRON_SECRET: ci-placeholder
      MAGIC_LINK_SECRET: ci-placeholder
      # Enables the test-auth shim (/api/test/login) so authenticated specs
      # run. MUST point SUPABASE_* at a dedicated CI/staging project — the
      # shim creates a fixture user (e2e-fixture@maestring.test) via the
      # service-role key. Never run this against the production project.
      ALLOW_TEST_AUTH: '1'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ hashFiles('package-lock.json') }}
      # Guardrail: refuse to run the test-auth shim against production Supabase.
      # Set repository variable PROD_SUPABASE_URL to the prod project URL; this
      # step fails loudly if CI secrets were ever pointed at it.
      - name: Assert non-prod Supabase target
        env:
          PROD_SUPABASE_URL: ${{ vars.PROD_SUPABASE_URL }}
        run: |
          if [ -z "${NEXT_PUBLIC_SUPABASE_URL:-}" ]; then
            echo "::error::NEXT_PUBLIC_SUPABASE_URL is empty — CI secrets not configured"
            exit 1
          fi
          if [ -n "${PROD_SUPABASE_URL:-}" ] && [ "$NEXT_PUBLIC_SUPABASE_URL" = "$PROD_SUPABASE_URL" ]; then
            echo "::error::CI Supabase URL matches PROD_SUPABASE_URL — test-auth shim would create fixture users in prod. Point CI at a staging project."
            exit 1
          fi
      - run: npx playwright install --with-deps chromium
      - run: npm run build
      - run: npm run test:e2e -- --grep @smoke
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
